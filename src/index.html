<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="img/webp/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Guild of Guardians is an epic mobile team RPG. Assemble your dream team of guardians, battle through challenging dungeons, and earn rewards. Play now!"
    />
    <link
      rel="preload"
      fetchpriority="high"
      as="image"
      href="/img/hero/hero-mobile.webp"
      type="image/png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <title>Guild of Guardians</title>

    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <load src="/partials/header.html" />

    <main>
      <load src="/partials/hero.html" />
      <load src="/partials/about-section.html" />
      <load src="/partials/guide-section.html" />
      <load src="/partials/characters-section.html" />
      <load src="/partials/gallery-section.html" />
      <load src="/partials/contactus-section.html" />
    </main>

    <load src="/partials/footer.html" />
    <load src="/partials/modal-menu.html" />

    <script type="module" src="./main.js"></script>
  </body>
</html>
